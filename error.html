<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EARTS – Página no encontrada</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      background: var(--gray-50);
    }
    .error-page__code {
      font-size: 6rem;
      font-weight: 800;
      color: var(--teal);
      line-height: 1;
      margin-bottom: 16px;
    }
    .error-page__title {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 12px;
    }
    .error-page__sub {
      color: var(--gray-600);
      max-width: 420px;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-page__code">404</div>
    <h1 class="error-page__title">Página no encontrada</h1>
    <p class="error-page__sub">La página que busca no existe o ha sido movida.</p>
    <a href="/" class="btn btn--primary">Volver al inicio</a>
  </div>
</body>
</html>
